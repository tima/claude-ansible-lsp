---
- name: Deploy and configure web application
  hosts: webservers
  become: true
  gather_facts: true

  vars:
    app_name: myapp
    app_port: 8080
    app_user: www-data
    packages:
      - nginx
      - python3
      - python3-pip
      - git
    vhosts:
      - name: primary
        server_name: app.example.com
        root: /var/www/myapp
        ssl: true
      - name: staging
        server_name: staging.example.com
        root: /var/www/staging
        ssl: false
    firewall_ports:
      - 80/tcp
      - 443/tcp
      - "{{ app_port }}/tcp"

  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart app
      ansible.builtin.service:
        name: "{{ app_name }}"
        state: restarted

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      tags: [packages]

  tasks:
    - name: Install required packages
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop: "{{ packages }}"
      tags: [packages]

    - name: Create application user
      ansible.builtin.user:
        name: "{{ app_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "/opt/{{ app_name }}"
        create_home: true

    - name: Create application directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "/opt/{{ app_name }}/bin", mode: "0755" }
        - { path: "/opt/{{ app_name }}/config", mode: "0750" }
        - { path: "/var/log/{{ app_name }}", mode: "0755" }
      loop_control:
        label: "{{ item.path }}"

    - name: Deploy application configuration
      ansible.builtin.template:
        src: app_config.j2
        dest: "/opt/{{ app_name }}/config/settings.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"
        validate: python3 -c "import yaml; yaml.safe_load(open('%s'))"
      notify:
        - Restart app
      tags: [config]

    - name: Configure virtual hosts
      ansible.builtin.template:
        src: vhost.conf.j2
        dest: "/etc/nginx/sites-available/{{ item.name }}.conf"
        mode: "0644"
      loop: "{{ vhosts }}"
      loop_control:
        label: "{{ item.server_name }}"
      when: item.ssl | default(false) | bool or not ansible_check_mode
      notify:
        - Restart nginx
      tags: [nginx, config]

    - name: Enable virtual hosts
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ item.name }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ item.name }}.conf"
        state: link
      loop: "{{ vhosts }}"
      loop_control:
        label: "{{ item.name }}"
      notify:
        - Restart nginx

    - name: Deploy systemd unit file
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ app_name }}.service"
        content: |
          [Unit]
          Description={{ app_name | capitalize }} Application
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          ExecStart=/opt/{{ app_name }}/bin/start.sh
          Restart=on-failure
          RestartSec=5
          Environment=PORT={{ app_port }}
          Environment=LOG_LEVEL={{ log_level | default('info') }}

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify:
        - Reload systemd
        - Restart app
      tags: [systemd]

    - name: Open firewall ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ firewall_ports }}"
      when: ansible_os_family == "RedHat"
      tags: [firewall]

    - name: Clone application repository
      block:
        - name: Pull latest code
          ansible.builtin.git:
            repo: "https://github.com/example/{{ app_name }}.git"
            dest: "/opt/{{ app_name }}/src"
            version: "{{ app_version | default('main') }}"
            force: false
          register: git_result

        - name: Install Python dependencies
          ansible.builtin.pip:
            requirements: "/opt/{{ app_name }}/src/requirements.txt"
            virtualenv: "/opt/{{ app_name }}/venv"
            virtualenv_command: python3 -m venv
          when: git_result.changed

        - name: Run database migrations
          ansible.builtin.command:
            cmd: "/opt/{{ app_name }}/venv/bin/python manage.py migrate"
            chdir: "/opt/{{ app_name }}/src"
          when: git_result.changed
          changed_when: "'No migrations to apply' not in migration_result.stdout"
          register: migration_result

      rescue:
        - name: Log deployment failure
          ansible.builtin.lineinfile:
            path: "/var/log/{{ app_name }}/deploy-errors.log"
            line: "{{ ansible_date_time.iso8601 }} - Deployment failed: {{ ansible_failed_result.msg | default('unknown error') }}"
            create: true
            mode: "0644"

        - name: Send failure notification
          ansible.builtin.debug:
            msg: >-
              Deployment of {{ app_name }} failed on {{ inventory_hostname }}.
              Error: {{ ansible_failed_result.msg | default('unknown') }}

      always:
        - name: Ensure services are running
          ansible.builtin.service:
            name: "{{ item }}"
            state: started
            enabled: true
          loop:
            - nginx
            - "{{ app_name }}"

  post_tasks:
    - name: Verify application health
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/health"
        return_content: true
        status_code: 200
      register: health_check
      retries: 5
      delay: 3
      until: health_check.status == 200
      tags: [verify]

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          Deployment complete:
            Host: {{ inventory_hostname }}
            App: {{ app_name }}
            Port: {{ app_port }}
            OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
            VHosts: {{ vhosts | map(attribute='server_name') | join(', ') }}
      tags: [verify]
